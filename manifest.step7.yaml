version: 0.1.0
name: step7-writing
description: Router manifest for Step 7 writing and evidence-to-draft workflows.

axes:
  mode:
    allowed:
      - draft
      - chapter-only
      - continue-existing
      - review-only
      - citation-audit
      - figure
      - pre-review
    default: draft
  target_genre:
    allowed:
      - thesis
      - journal
      - review
      - report
      - proposal
      - conference
    default: thesis
  figure_backend:
    allowed:
      - auto
      - quick
      - reproduction
      - not_applicable
    default: auto

always_load:
  - static/core/output-contract.md
  - references/genre-style-axis.md
  - references/writing-modes.md

mode_routes:
  draft: references/section-blueprint-workflow.md
  chapter-only: references/section-blueprint-workflow.md
  continue-existing: references/style-learning-workflow.md
  review-only: references/section-blueprint-workflow.md
  citation-audit: references/citation-audit-contract.md
  figure: references/figure-writing-interface.md
  pre-review: references/reviewer-protocol.md
