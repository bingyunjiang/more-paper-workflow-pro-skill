# =============================================================================
# CHINESE CDP PUBLISHERS (CNKI / Wanfang)
# =============================================================================

# --- CNKI (中国知网) ---
[publishers.cnki]
doi_prefixes = ["10.3969/"]
strategy = "chinese_cdp"
provider_label = "CNKI"
route_hint = "chinese_cdp_serial"
selectors = [
    "a.downlink",
    "a[href*=\"download\"]",
    "a[href*=\".pdf\"]",
    "a[onclick*=\"download\"]",
    "div.download a",
    "#download a",
    "a:has-text(\"下载\")",
    "a:has-text(\"PDF\")",
    "a:has-text(\"CAJ\")",
]
requires_auth = "institution"
publisher_domain = "kns.cnki.net"
login_url = "https://kns.cnki.net/kns8s/"
known_issues = "大多数中文论文无真实 DOI，需通过检索结果中的文章详情页链接直接下载。CDP 浏览器需已登录 CNKI（校园网 IP 直连或 CARSI SSO）。提供 PDF 和 CAJ 两种下载格式。"

# --- Wanfang Data (万方数据) ---
