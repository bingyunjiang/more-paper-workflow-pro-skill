# Publisher Download Strategy Configuration
# ==========================================
# Single source of truth for all publisher-specific PDF download knowledge.
# Used by generic_publisher_downloader.py and unified_download_router.py.
#
# Strategy types:
#   ieee_cdp    → Use existing download_via_ieee.py (100% with SSO)
#   generic     → Use generic_publisher_downloader.py (publisher-specific adapter → strategy A → B fallback)
#   chinese_cdp → CDP-based download for Chinese publishers (CNKI/Wanfang)
#                 navigates to article detail page, extracts PDF via selectors
#   direct_http → Standard urllib download (OA journals, no auth needed)
#   scihub_only → Only Sci-Hub works for this publisher (post-2021 papers may miss)
#   skip        → Known impossible to automate (Akamai/Cloudflare without fallback)


# =============================================================================
# GENERIC ROUTED PUBLISHERS
# =============================================================================

[publishers.sd_elsevier]
doi_prefixes = ["10.1016/"]
strategy = "generic"
requires_auth = "ip_or_sso"
provider_label = "ScienceDirect / Elsevier"
publisher_domain = "www.sciencedirect.com"
login_url = "https://www.sciencedirect.com/"
route_hint = "generic_cdp_sd_adapter"
notes = "ScienceDirect adapter inside Generic CDP. Reuses PII → /pdfft → PDF capture path."

[publishers.ieee]
doi_prefixes = ["10.1109/"]
strategy = "ieee_cdp"
pdf_url_requires_referrer = true
selectors = [
    "a[href*=\"/stamp/\"]",
    "a.stats-document-lh-action-downloads-PDF",
    "a:has-text(\"PDF\")",
    "button:has-text(\"PDF\")",
]
requires_auth = "sso"
publisher_domain = "ieeexplore.ieee.org"
login_url = "https://ieeexplore.ieee.org/"
provider_label = "IEEE Xplore"
route_hint = "generic_cdp_with_referrer"
notes = "Generic CDP via Strategy B (article page → stamp URL extraction → getPDF.jsp capture). Dedicated download_via_ieee.py available as fallback for interactive SSO login flow."


# =============================================================================
# OA VIA GENERIC CDP (direct HTTP may be blocked)
# =============================================================================

[publishers.mdpi]
doi_prefixes = ["10.3390/"]
strategy = "generic"
requires_auth = "none"
publisher_domain = "www.mdpi.com"
provider_label = "MDPI"
manual_required = true
selectors = [
    "a.UD_ArticlePDF",
    "a[href*=\"/pdf?version=\"]",
    "a[href$=\"/pdf\"]",
    "a[href*=\"/pdf\"]",
]
notes = "Open Access. Direct HTTP may return Akamai 403; use CDP article page extraction and fall back to manual browser click."


# =============================================================================
# DIRECT HTTP PUBLISHERS (OA, no auth needed)
# =============================================================================

[publishers.frontiers]
doi_prefixes = ["10.3389/"]
strategy = "direct_http"
pdf_url_template = "https://www.frontiersin.org/articles/{doi}/pdf"
requires_auth = "none"
publisher_domain = "www.frontiersin.org"
provider_label = "Frontiers"
manual_required = false
notes = "Open Access. Direct HTTP download works."


