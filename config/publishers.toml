# =============================================================================
# ACCESS BARRIER DETECTION (global, used by all generic strategies)
# =============================================================================

[barriers.cloudflare]
title_patterns = [
    "just a moment",
    "attention required",
    "checking your browser",
    "verifying you are human",
    "ddos protection",
    "please wait",
    "请稍候",
    "challenge",
    "security check",
    "access denied",
]
body_selectors = [
    "div.cf-turnstile",
    "#cf-challenge-running",
    ".cf-browser-verification",
    "#challenge-form",
    "iframe[src*=\"challenge\"]",
]
url_patterns = [
    "challenge",
    "turnstile",
    "captcha",
]

[barriers.radware]
title_patterns = [
    "radware bot manager captcha",
    "bot manager",
]
body_selectors = []

[barriers.captcha]
detection_selectors = [
    "iframe[src*=\"hcaptcha\"]",
    "iframe[src*=\"recaptcha\"]",
    "#px-captcha",
    "iframe[src*=\"captcha\"]",
    "div.g-recaptcha",
]

[barriers.login_wall]
url_patterns = [
    "/login",
    "/signin",
    "/sso",
    "/auth",
    "wayf",
    "shibboleth",
    "idp",
]
title_patterns = [
    "sign in",
    "log in",
    "institutional access",
    "authentication required",
    "please sign in",
    "single sign-on",
]
